{{- if .Values.kyverno.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-untrusted-registries
  labels:
    {{- include "tipsbank.labels" . | nindent 4 }}
  annotations:
    policies.kyverno.io/title: Proibir registries não confiáveis
    policies.kyverno.io/category: Segurança TipsBank
    policies.kyverno.io/description: >-
      Rejeita pods cujas imagens não sejam originadas de registries autorizados.
      Aplica-se apenas aos namespaces da aplicação TipsBank.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-image-registry
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - tipsbank-contas
                - tipsbank-transacoes
                - tipsbank-auditoria
                - tipsbank-web
      validate:
        message: >-
          Registry não autorizado. Use apenas: {{ .Values.rbac.trustedRegistry }}/*, busybox:*, postgres:*
          ou ghcr.io/*.
        foreach:
          - list: "request.object.spec.[containers, initContainers][]"
            deny:
              conditions:
                all:
                  - key: "{{ "{{" }} element.image {{ "}}" }}"
                    operator: AnyNotIn
                    value:
                      - "{{ .Values.rbac.trustedRegistry }}/*"
                      - "docker.io/{{ .Values.rbac.trustedRegistry }}/*"
                      - "busybox:*"
                      - "docker.io/library/busybox:*"
                      - "postgres:*"
                      - "docker.io/library/postgres:*"
                      - "ghcr.io/*"
{{- end }}
