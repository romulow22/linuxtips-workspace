{{- if .Values.kyverno.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-default-deny-netpol
  labels:
    {{- include "tipsbank.labels" . | nindent 4 }}
  annotations:
    policies.kyverno.io/title: Gerar NetworkPolicy default-deny em novos namespaces
    policies.kyverno.io/category: Segurança TipsBank
    policies.kyverno.io/description: >-
      Ao criar qualquer namespace (exceto os do sistema), gera automaticamente
      uma NetworkPolicy default-deny-all bloqueando todo tráfego.
spec:
  rules:
    - name: generate-default-deny
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          - resources:
              names:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - cert-manager
                - ingress-nginx
                - tipsbank-contas
                - tipsbank-transacoes
                - tipsbank-auditoria
                - tipsbank-web
                - tipsbank-monitoring
      generate:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: default-deny-all
        namespace: "{{`{{request.object.metadata.name}}`}}"
        synchronize: true
        data:
          metadata:
            labels:
              generated-by: kyverno
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
              - Egress
{{- end }}
