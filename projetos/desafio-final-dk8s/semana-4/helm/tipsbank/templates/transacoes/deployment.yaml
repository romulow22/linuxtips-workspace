apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-transacoes
  namespace: tipsbank-transacoes
  labels:
    {{- include "tipsbank.labels" . | nindent 4 }}
    app: api-transacoes
spec:
  replicas: {{ .Values.transacoes.replicas }}
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: api-transacoes
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-transacoes
        version: v1
        team: {{ .Values.global.team }}
        env: {{ .Values.global.env }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: api-transacoes
                topologyKey: kubernetes.io/hostname
      securityContext:
        fsGroup: 65532
      initContainers:
        # Aguarda o Postgres (DNS do headless service + porta 5432) antes de subir a app.
        # Sem isso, a api-transacoes faz connect ansioso no startup, falha o DNS cross-namespace
        # enquanto postgres-0 ainda nao esta Ready e sai com exit code 3 -> restarts.
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: {{ include "tipsbank.imagePullPolicy" . }}
          securityContext:
            runAsUser: 65532
          command:
            - sh
            - -c
            - |
              echo "[init] aguardando postgres-headless.tipsbank-contas:5432 ..."
              until nc -z -w 3 postgres-headless.tipsbank-contas.svc.cluster.local 5432; do
                sleep 3
              done
              echo "[init] postgres acessivel; iniciando api-transacoes"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: api-transacoes
          image: {{ .Values.transacoes.image.repository }}:{{ .Values.transacoes.image.tag }}
          imagePullPolicy: {{ include "tipsbank.imagePullPolicy" . }}
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: secret-db
                  key: DB_URL
            - name: CONTAS_URL
              valueFrom:
                configMapKeyRef:
                  name: configmap-app
                  key: CONTAS_URL
            - name: AUDITORIA_URL
              valueFrom:
                configMapKeyRef:
                  name: configmap-app
                  key: AUDITORIA_URL
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: configmap-app
                  key: APP_VERSION
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: configmap-app
                  key: LOG_LEVEL
            - name: LOG_FILE
              valueFrom:
                configMapKeyRef:
                  name: configmap-app
                  key: LOG_FILE
          resources:
            {{- toYaml .Values.transacoes.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app

        - name: log-forwarder
          image: busybox:1.36
          imagePullPolicy: {{ include "tipsbank.imagePullPolicy" . }}
          command: ["sh", "-c", "tail -F /var/log/app/app.log 2>/dev/null || (sleep 2 && tail -F /var/log/app/app.log)"]
          securityContext:
            runAsUser: 65532
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi

      volumes:
        - name: app-logs
          emptyDir: {}
