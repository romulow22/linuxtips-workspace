{{- if and .Values.locust.enabled .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-locust
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "tipsbank.labels" . | nindent 4 }}
    app: locust
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.locust.host | default .Values.ingress.apiHost }}
      http:
        paths:
          - path: {{ .Values.locust.ingressPath | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: locust
                port:
                  number: 8089
{{- end }}
