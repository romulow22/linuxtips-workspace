## values-eks-dev.yaml — EKS (AWS) + ambiente DEV
## No EKS o FQDN do NLB muda a cada recriação do cluster — passe via --set:
##   $nlb = kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
##   helm upgrade --install tipsbank ... -f values-eks-dev.yaml --set ingress.appHost=$nlb --set ingress.apiHost=$nlb

global:
  env: dev
  imagePullPolicy: IfNotPresent

ingress:
  tls:
    enabled: false   # NLB EKS termina TLS externamente; cert-manager não é necessário em dev

locust:
  host: ""            # falls back to ingress.apiHost (NLB FQDN)
  basePath: /locust   # required: shared NLB host needs path routing
  ingressPath: /locust

postgres:
  storageClass: gp2
  storage: 2Gi

contas:
  replicas: 1
  hpa:
    enabled: false

transacoes:
  replicas: 1
  hpa:
    enabled: false

auditoria:
  replicas: 1
  storageClass: nfs-ganesha
  storage: 5Gi
  hpa:
    enabled: false

web:
  replicas: 1
  hpa:
    enabled: false
