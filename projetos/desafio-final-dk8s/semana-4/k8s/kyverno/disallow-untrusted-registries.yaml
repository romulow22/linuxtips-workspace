apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-untrusted-registries
  annotations:
    policies.kyverno.io/title: Proibir registries não confiáveis
    policies.kyverno.io/category: Segurança TipsBank
    policies.kyverno.io/description: >-
      Rejeita pods cujas imagens não sejam originadas de registries autorizados:
      docker.io/romulow22, docker.io/library/busybox, docker.io/library/postgres
      ou ghcr.io. Aplica-se apenas aos namespaces da aplicação TipsBank.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-image-registry
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - tipsbank-contas
                - tipsbank-transacoes
                - tipsbank-auditoria
                - tipsbank-web
      validate:
        message: >-
          Registry não autorizado. Use apenas: romulow22/*, busybox:*, postgres:*
          ou ghcr.io/*. Registry externo (ex: docker.io/nginx) é bloqueado.
        foreach:
          - list: "request.object.spec.[containers, initContainers][]"
            deny:
              conditions:
                all:
                  - key: "{{ element.image }}"
                    operator: AnyNotIn
                    value:
                      - "romulow22/*"
                      - "docker.io/romulow22/*"
                      - "busybox:*"
                      - "docker.io/library/busybox:*"
                      - "postgres:*"
                      - "docker.io/library/postgres:*"
                      - "ghcr.io/*"
