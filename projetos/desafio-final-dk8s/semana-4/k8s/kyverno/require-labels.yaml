apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-labels
  annotations:
    policies.kyverno.io/title: Labels obrigatórios em workloads
    policies.kyverno.io/category: Boas Práticas TipsBank
    policies.kyverno.io/description: >-
      Exige que todos os Deployments, StatefulSets e DaemonSets do TipsBank
      possuam os labels 'app', 'team' e 'env' em seus metadados.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-required-labels
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - cert-manager
                - ingress-nginx
                - tipsbank-monitoring
      validate:
        message: >-
          Labels obrigatórios ausentes: 'app', 'team' e 'env' devem estar
          presentes em metadata.labels. Exemplo: team=tipsbank, env=prod.
        pattern:
          metadata:
            labels:
              app: "?*"
              team: "?*"
              env: "?*"
