apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-app
  namespace: tipsbank-web
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-issuer
    # Rate limit: 50 req/s por IP — proteção geral de entrada da SPA.
    # burst-multiplier=1 mantém o burst igual ao rate (50 req), sem folga extra.
    # Sem isso o burst padrão seria 50×5=250 e nunca geraria 429 em testes pequenos.
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "1"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.tipsbank.local
      secretName: tipsbank-app-tls
  rules:
    - host: app.tipsbank.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 8080
