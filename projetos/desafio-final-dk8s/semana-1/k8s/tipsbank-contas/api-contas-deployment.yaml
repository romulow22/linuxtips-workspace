# Substitua a imagem pelo valor gerado na etapa 1.2
# Exemplo: ghcr.io/SEU_USUARIO/tipsbank-api-contas:v1.0.0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-contas
  namespace: tipsbank-contas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-contas
  template:
    metadata:
      labels:
        app: api-contas
    spec:
      # imagePullSecrets:
      #   - name: registry-credentials
      containers:
        - name: api-contas
          image: romulow22/tipsbank-api-contas:v1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: secret-db
                  key: DB_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: configmap-app
                  key: LOG_LEVEL
