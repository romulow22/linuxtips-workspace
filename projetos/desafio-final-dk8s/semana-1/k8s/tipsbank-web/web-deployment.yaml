# Substitua a imagem pelo valor gerado na etapa 1.2
# Exemplo: ghcr.io/SEU_USUARIO/tipsbank-web:v1.0.0
#
# O nginx.conf com upstreams FQDN é montado via ConfigMap em /etc/nginx/nginx.conf,
# substituindo o arquivo embutido na imagem sem precisar reempacotar.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: tipsbank-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      # imagePullSecrets:
      #   - name: registry-credentials
      containers:
        - name: web
          image: romulow22/tipsbank-web:v1.0.0
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: configmap-nginx
