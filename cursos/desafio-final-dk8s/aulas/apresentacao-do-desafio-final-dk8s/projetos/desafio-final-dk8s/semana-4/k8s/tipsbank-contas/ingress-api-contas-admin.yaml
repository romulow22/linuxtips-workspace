# Ingress separado para proteger /contas/admin com Basic Auth.
# Anotações de auth se aplicam ao Ingress inteiro — por isso a rota admin
# precisa de seu próprio recurso Ingress.
#
# Rewrite: api.tipsbank.local/contas/admin/contas → /contas (lista contas)
#           api.tipsbank.local/contas/admin        → /contas
# Sem credencial  → 401 (nginx-ingress recusa antes de chegar ao backend)
# Com credencial  → proxeia para /contas na api-contas
#
# Secret basic-auth-admin criado pelo script etapa-2.2.ps1 (usuário: admin)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-api-contas-admin
  namespace: tipsbank-contas
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-issuer
    nginx.ingress.kubernetes.io/rewrite-target: /contas/$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: basic-auth-admin
    nginx.ingress.kubernetes.io/auth-realm: "TipsBank Admin"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.tipsbank.local
      secretName: tipsbank-api-tls
  rules:
    - host: api.tipsbank.local
      http:
        paths:
          - path: /contas/admin(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-contas
                port:
                  number: 8080
