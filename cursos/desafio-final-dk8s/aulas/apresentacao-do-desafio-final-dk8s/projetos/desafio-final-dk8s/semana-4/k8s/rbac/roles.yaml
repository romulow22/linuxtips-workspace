---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: operador-contas
  namespace: tipsbank-contas
  labels:
    app: rbac
    team: tipsbank
    env: prod
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: operador-transacoes
  namespace: tipsbank-transacoes
  labels:
    app: rbac
    team: tipsbank
    env: prod
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
