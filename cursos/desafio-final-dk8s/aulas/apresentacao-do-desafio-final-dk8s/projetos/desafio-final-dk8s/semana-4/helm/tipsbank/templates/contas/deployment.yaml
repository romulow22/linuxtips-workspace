apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-contas
  namespace: tipsbank-contas
  labels:
    {{- include "tipsbank.labels" . | nindent 4 }}
    app: api-contas
spec:
  replicas: {{ .Values.contas.replicas }}
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: api-contas
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-contas
        team: {{ .Values.global.team }}
        env: {{ .Values.global.env }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: api-contas
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: {{ include "tipsbank.imagePullPolicy" . }}
          command: ['sh', '-c', 'until nc -z postgres-headless 5432; do echo waiting for postgres; sleep 2; done']
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: api-contas
          image: {{ .Values.contas.image.repository }}:{{ .Values.contas.image.tag }}
          imagePullPolicy: {{ include "tipsbank.imagePullPolicy" . }}
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: secret-db
                  key: DB_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: configmap-app
                  key: LOG_LEVEL
          resources:
            {{- toYaml .Values.contas.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            periodSeconds: 5
            failureThreshold: 3
