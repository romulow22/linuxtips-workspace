{{- if .Values.kyverno.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  labels:
    {{- include "tipsbank.labels" . | nindent 4 }}
  annotations:
    policies.kyverno.io/title: Proibir tag :latest
    policies.kyverno.io/category: Segurança TipsBank
    policies.kyverno.io/description: >-
      Rejeita pods cujas imagens usem a tag :latest ou não possuam tag
      explícita, exigindo versões imutáveis e rastreáveis.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - cert-manager
                - ingress-nginx
                - tipsbank-monitoring
      validate:
        message: "Tag ':latest' proibida. Use tag explícita (ex: v1.0.0, 16-alpine)."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
            =(initContainers):
              - image: "!*:latest"
{{- end }}
