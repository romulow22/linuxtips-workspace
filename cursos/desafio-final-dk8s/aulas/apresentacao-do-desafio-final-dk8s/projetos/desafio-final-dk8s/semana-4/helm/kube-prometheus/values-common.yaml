# Configurações comuns para EKS e Vagrant.
# O kube-prometheus-stack é instalado no namespace 'monitoring'.
# Os ServiceMonitors e PrometheusRules da aplicação ficam em 'tipsbank-monitoring'.
# Os seletores abaixo garantem descoberta cross-namespace sem filtro de label.
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}   # descobre ServiceMonitors em todos os namespaces
    ruleNamespaceSelector: {}             # descobre PrometheusRules em todos os namespaces
    retention: 15d

grafana:
  adminPassword: prom-operator
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL

alertmanager:
  alertmanagerSpec:
    retention: 120h
