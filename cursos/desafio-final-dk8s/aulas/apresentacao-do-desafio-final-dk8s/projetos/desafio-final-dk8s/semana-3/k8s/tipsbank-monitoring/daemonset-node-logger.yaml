apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-logger
  namespace: tipsbank-monitoring
  labels:
    app: node-logger
spec:
  selector:
    matchLabels:
      app: node-logger
  template:
    metadata:
      labels:
        app: node-logger
    spec:
      tolerations:
        - key: compliance
          operator: Equal
          value: strict
          effect: NoSchedule
      containers:
        - name: node-logger
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              while true; do
                echo "{\"ts\":\"$(date -u +%FT%TZ)\",\"node\":\"$NODE_NAME\",\"disk\":\"$(df -h / | tail -1 | awk '{print $5}' | tr -d '%')\",\"mem_kb\":\"$(grep MemAvailable /proc/meminfo | awk '{print $2}')\"}"
                sleep 30
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 20m
              memory: 32Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: proc
              mountPath: /proc
              readOnly: true
      volumes:
        - name: proc
          hostPath:
            path: /proc
