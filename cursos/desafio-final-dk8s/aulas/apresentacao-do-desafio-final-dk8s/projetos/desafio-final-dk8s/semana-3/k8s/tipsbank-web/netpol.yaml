---
# [1/5] Default deny — bloqueia todo ingress e egress por padrão
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: tipsbank-web
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# [2/5] Egress DNS — todos os pods podem resolver nomes via kube-dns
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: tipsbank-web
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
# [3/5] Ingress Controller → web (entrada principal do usuário via app.tipsbank.local)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: tipsbank-web
spec:
  podSelector:
    matchLabels:
      app: web
  policyTypes: [Ingress]
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - port: 8080
      protocol: TCP
---
# [4/5] web → api-contas e api-transacoes (proxy reverso nginx — abordagem híbrida)
#   Necessário porque a SPA chama as APIs via paths relativos no nginx do web.
#   Se a arquitetura fosse Ingress puro (sem proxy no nginx), este egress seria
#   desnecessário — apenas DNS + Ingress seria suficiente.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-apis
  namespace: tipsbank-web
spec:
  podSelector:
    matchLabels:
      app: web
  policyTypes: [Egress]
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: tipsbank-contas
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: tipsbank-transacoes
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: tipsbank-auditoria
    ports:
    - port: 8080
      protocol: TCP
---
# [5/5] Egress para Google Fonts (CDN externa usada pela SPA)
#   A SPA carrega fontes de fonts.googleapis.com e fonts.gstatic.com.
#   ipBlock/except: permite HTTPS para qualquer IP externo exceto o metadata endpoint.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-external-cdn
  namespace: tipsbank-web
spec:
  podSelector:
    matchLabels:
      app: web
  policyTypes: [Egress]
  egress:
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32  # AWS/GCP instance metadata — bloqueado
        - 10.0.0.0/8          # cluster-internal: use service DNS
        - 192.168.0.0/16      # rede interna Vagrant
    ports:
    - port: 443
      protocol: TCP
    - port: 80
      protocol: TCP
