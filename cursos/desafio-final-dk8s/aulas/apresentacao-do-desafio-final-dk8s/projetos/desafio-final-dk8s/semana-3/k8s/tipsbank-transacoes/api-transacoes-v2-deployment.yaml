apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-transacoes-v2
  namespace: tipsbank-transacoes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-transacoes
      version: v2
  template:
    metadata:
      labels:
        app: api-transacoes
        version: v2
    spec:
      securityContext:
        fsGroup: 65532
      containers:
        - name: api-transacoes
          # Build: docker build -t romulow22/tipsbank-api-transacoes:v2.0.0 apps/api-transacoes
          image: romulow22/tipsbank-api-transacoes:v2.0.0
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: secret-db
                  key: DB_URL
            - name: CONTAS_URL
              valueFrom:
                configMapKeyRef:
                  name: configmap-app
                  key: CONTAS_URL
            - name: AUDITORIA_URL
              valueFrom:
                configMapKeyRef:
                  name: configmap-app
                  key: AUDITORIA_URL
            - name: APP_VERSION
              value: "v2"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: configmap-app
                  key: LOG_LEVEL
            - name: LOG_FILE
              valueFrom:
                configMapKeyRef:
                  name: configmap-app
                  key: LOG_FILE
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app

        - name: log-forwarder
          image: busybox:1.36
          command: ["sh", "-c", "tail -F /var/log/app/app.log 2>/dev/null || (sleep 2 && tail -F /var/log/app/app.log)"]
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi

      volumes:
        - name: app-logs
          emptyDir: {}
