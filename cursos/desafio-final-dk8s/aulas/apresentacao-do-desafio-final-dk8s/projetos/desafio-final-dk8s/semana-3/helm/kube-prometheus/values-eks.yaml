# EKS: roteamento por path via hostname do NLB (mesma estrategia do deploy-apps.ps1).
# O hostname do NLB e passado dinamicamente em install-addons.ps1 via --set.
# Acesso direto sem /etc/hosts:
#   http://<nlb-hostname>/grafana
#   http://<nlb-hostname>/prometheus
#   http://<nlb-hostname>/alertmanager
#
# Tolerations: permite scheduling no node com taint compliance=strict (Etapa 3.3).

grafana:
  tolerations:
    - key: compliance
      operator: Equal
      value: strict
      effect: NoSchedule
  env:
    GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    # GF_SERVER_ROOT_URL injetado via --set grafana.env.GF_SERVER_ROOT_URL em install-addons.ps1
  ingress:
    enabled: true
    ingressClassName: nginx
    path: /grafana
    pathType: Prefix
    # hosts injetado via --set grafana.ingress.hosts[0]=$nlb
  persistence:
    enabled: true
    storageClassName: gp2
    size: 2Gi

prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx
    paths:
      - /prometheus
    pathType: Prefix
    # hosts injetado via --set prometheus.ingress.hosts[0]=$nlb
  prometheusSpec:
    tolerations:
      - key: compliance
        operator: Equal
        value: strict
        effect: NoSchedule
    routePrefix: /prometheus
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 8Gi

alertmanager:
  ingress:
    enabled: true
    ingressClassName: nginx
    paths:
      - /alertmanager
    pathType: Prefix
    # hosts injetado via --set alertmanager.ingress.hosts[0]=$nlb
  alertmanagerSpec:
    tolerations:
      - key: compliance
        operator: Equal
        value: strict
        effect: NoSchedule
    routePrefix: /alertmanager
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 2Gi
