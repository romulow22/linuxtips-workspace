---
# [1/6] Default deny — bloqueia todo ingress e egress por padrão
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: tipsbank-transacoes
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# [2/6] Egress DNS — todos os pods podem resolver nomes via kube-dns
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: tipsbank-transacoes
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
# [3/6] Ingress Controller → api-transacoes (acesso direto via api.tipsbank.local)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: tipsbank-transacoes
spec:
  podSelector:
    matchLabels:
      app: api-transacoes
  policyTypes: [Ingress]
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - port: 8080
      protocol: TCP
---
# [4/6] web → api-transacoes (abordagem híbrida: nginx do web faz proxy)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-web
  namespace: tipsbank-transacoes
spec:
  podSelector:
    matchLabels:
      app: api-transacoes
  policyTypes: [Ingress]
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: tipsbank-web
    ports:
    - port: 8080
      protocol: TCP
---
# [5/6] api-transacoes → api-contas (porta 8080) e postgres (porta 5432)
#   postgres-headless.tipsbank-contas.svc.cluster.local:5432
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-contas
  namespace: tipsbank-transacoes
spec:
  podSelector:
    matchLabels:
      app: api-transacoes
  policyTypes: [Egress]
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: tipsbank-contas
    ports:
    - port: 8080
      protocol: TCP
    - port: 5432
      protocol: TCP
---
# [6/6] api-transacoes → auditoria (publicação de eventos pós-transferência)
#
# ipBlock/except: além do egress interno, demonstra o padrão de segurança para
# chamadas externas (ex: integrações com sistemas de pagamento). A CIDR
# 169.254.169.254/32 é o endpoint de metadados do EC2/EKS — seu acesso permite
# que um pod comprometido obtenha credenciais IAM da instância. O except garante
# que mesmo se um range amplo for liberado, o metadata endpoint permanece bloqueado.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-auditoria
  namespace: tipsbank-transacoes
spec:
  podSelector:
    matchLabels:
      app: api-transacoes
  policyTypes: [Egress]
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: tipsbank-auditoria
    ports:
    - port: 8080
      protocol: TCP
  # ipBlock/except: permite HTTPS externo (integrações) bloqueando metadata EC2/EKS
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32  # AWS/GCP instance metadata — bloqueado explicitamente
        - 10.0.0.0/8          # cluster-internal: use service DNS em vez de IP direto
        - 192.168.0.0/16      # rede interna Vagrant
    ports:
    - port: 443
      protocol: TCP
